steps:
  # Build the Next.js image with required build-time env vars
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cbs-portal-uat/ui:$BUILD_ID'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cbs-portal-uat/ui:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_STRAPI_API_URL=https://cbs-strapi-uat-147527109622.europe-west1.run.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_SITE_URL=https://cbs-ui-uat-147527109622.europe-west1.run.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_FOOTER_DOCS_BASE=https://storage.googleapis.com/cbs-portal-uploads-uat'
      - '-f'
      - 'cbs-portal-ui/Dockerfile'
      - 'cbs-portal-ui/'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cbs-portal-uat/ui:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cbs-ui-uat'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/cbs-portal-uat/ui:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--port=3000'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--concurrency=80'
      - '--timeout=60'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production,NEXT_PUBLIC_STRAPI_API_URL=https://cbs-strapi-uat-147527109622.europe-west1.run.app,NEXT_PUBLIC_SITE_URL=https://cbs-ui-uat-147527109622.europe-west1.run.app,NEXT_PUBLIC_FOOTER_DOCS_BASE=https://storage.googleapis.com/cbs-portal-uploads-uat,GATE_ENABLED=true'
      - '--set-secrets=GATE_USERNAME=gate-username:latest,GATE_PASSWORD=gate-password:latest,GATE_SECRET=gate-secret:latest'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cbs-portal-uat/ui:latest'

options:
  logging: CLOUD_LOGGING_ONLY
